#cloud-config
# yorb/yai — OrbStack VM bootstrap + yai stack (Ubuntu & Debian)
# Extends ai.yml: same toolchain, plus clones yai into /srv/yai.
#
# Usage:
#   orb create -c template/yai.yml ubuntu:24.04 <vm-name>
#   orb create -c template/yai.yml debian:trixie <vm-name>

package_update: true
package_upgrade: true

packages:
  - curl
  - wget
  - git
  - ca-certificates
  - gnupg
  - lsb-release
  - openssh-client
  - unzip
  - zip
  - jq
  - mc
  - gettext-base
  - build-essential
  - htop
  - tmux
  - vim
  - nano

write_files:
  - path: /root/yorb-setup.sh
    permissions: '0700'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      export HOME=/root
      export PATH="/usr/local/bin:/usr/bin:/bin:$PATH"

      DISTRO_ID="$(grep '^ID=' /etc/os-release | cut -d= -f2)"
      CODENAME="$(lsb_release -cs)"
      DEFAULT_USER="$(getent passwd 1000 | cut -d: -f1)"

      # --- Docker CE ---
      curl -fsSL https://get.docker.com | sh

      # --- PHP 8.5 ---
      # Ubuntu: ondrej/php PPA  |  Debian: Sury apt repo
      if [ "$DISTRO_ID" = "ubuntu" ]; then
        apt-get install -y software-properties-common
        LC_ALL=C.UTF-8 add-apt-repository -y ppa:ondrej/php
      else
        curl -fsSL https://packages.sury.org/php/apt.gpg \
          | gpg --dearmor -o /etc/apt/keyrings/sury-php.gpg
        echo "deb [signed-by=/etc/apt/keyrings/sury-php.gpg] https://packages.sury.org/php/ ${CODENAME} main" \
          > /etc/apt/sources.list.d/sury-php.list
      fi
      apt-get update -q
      apt-get install -y \
        php8.5 php8.5-cli php8.5-fpm php8.5-common \
        php8.5-curl php8.5-mbstring php8.5-xml php8.5-zip \
        php8.5-bcmath php8.5-gd php8.5-intl \
        php8.5-mysql php8.5-pgsql php8.5-sqlite3 \
        php8.5-redis php8.5-imagick

      # --- Composer ---
      curl -fsSL https://getcomposer.org/installer \
        | php -- --install-dir=/usr/local/bin --filename=composer
      chmod +x /usr/local/bin/composer

      # --- Node.js 22 LTS + npm ---
      curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
      apt-get install -y nodejs

      # --- Deno (system-wide) ---
      curl -fsSL https://deno.land/x/install/install.sh | DENO_INSTALL=/usr/local sh

      # --- Bun (system-wide) ---
      curl -fsSL https://bun.sh/install | BUN_INSTALL=/usr/local bash

      # --- Claude Code ---
      npm install -g @anthropic-ai/claude-code

      # --- Codex ---
      npm install -g @openai/codex

      # --- opencode ---
      curl -fsSL https://opencode.ai/install | bash
      chmod 755 /root /root/.opencode /root/.opencode/bin /root/.opencode/bin/opencode
      ln -sfn /root/.opencode/bin/opencode /usr/local/bin/opencode

      # --- agent-browser ---
      npm install -g agent-browser

      # --- Git identity (substituted by yorb.sh from host git config) ---
      if [ -n "${GIT_NAME}" ];  then git config --system user.name  "${GIT_NAME}";  fi
      if [ -n "${GIT_EMAIL}" ]; then git config --system user.email "${GIT_EMAIL}"; fi

      # --- yai ---
      mkdir -p /srv/yai
      chown "$DEFAULT_USER:$DEFAULT_USER" /srv/yai
      sudo -u "$DEFAULT_USER" git clone https://github.com/ynfra/yai.git /srv/yai

runcmd:
  - /root/yorb-setup.sh

final_message: |
  yorb/yai cloud-init complete.
  yai cloned to /srv/yai
  Connect: orb shell <vm-name>  |  ssh <vm-name>@orb
